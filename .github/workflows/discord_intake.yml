name: discord receipt intake

# Discord「経費管理」チャンネルに投稿された領収書画像を巡回して読み取り、経費シートへ追記。
on:
  schedule:
    - cron: '*/10 * * * *'   # 10分ごとに巡回(パブリックリポ=Actions無料のため常時)。投稿から約10-20分で✅返信
  workflow_dispatch: {}      # 手動実行(テスト用)

# 巡回が重なっても二重処理しない(前の巡回が終わるまで次を待たせる)
concurrency:
  group: discord-intake
  cancel-in-progress: false

jobs:
  intake:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r requirements.txt
      - run: python discord_intake.py
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          RECEIPT_CHANNEL_ID: ${{ secrets.RECEIPT_CHANNEL_ID }}
          RECEIPT_REPLY_WEBHOOK: ${{ secrets.RECEIPT_REPLY_WEBHOOK }}
          RECEIPT_ARCHIVE_FOLDER_ID: ${{ secrets.RECEIPT_ARCHIVE_FOLDER_ID }}   # 月別保管の親フォルダ(任意・別フォルダ)
