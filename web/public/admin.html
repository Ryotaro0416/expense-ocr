<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>経費OCR 管理</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  :root {
    --bg: #f7f7f5;
    --surface: #ffffff;
    --border: #e6e4df;
    --text: #1a1a1a;
    --muted: #6b6b6b;
    --faint: #9a9a9a;
    --accent: #2563eb;
    --accent-soft: #eff4ff;
    --on-bg: #ecfdf5; --on-text: #065f46; --on-border: #6ee7b7;
    --off-bg: #f3f4f6; --off-text: #6b7280;
    --danger: #dc2626; --danger-soft: #fef2f2;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f10; --surface: #1a1a1c; --border: #2a2a2d;
      --text: #ededed; --muted: #a0a0a0; --faint: #6b6b6b;
      --accent: #60a5fa; --accent-soft: #1e2a4a;
      --on-bg: #0f2a1f; --on-text: #86efac; --on-border: #14532d;
      --off-bg: #262629; --off-text: #9ca3af;
      --danger: #f87171; --danger-soft: #2a1414;
    }
  }
  body {
    font-family: 'Inter', 'Noto Sans JP', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg); color: var(--text); margin: 0; padding: 32px 20px 80px;
    -webkit-font-smoothing: antialiased; font-feature-settings: "palt";
  }
  .container { max-width: 1200px; margin: 0 auto; }
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; gap: 16px; flex-wrap: wrap; }
  h1 { font-size: 22px; font-weight: 700; margin: 0; letter-spacing: -0.01em; }
  .summary { color: var(--muted); font-size: 14px; }

  .auth { display: flex; gap: 8px; }
  .auth input {
    padding: 9px 12px; font-size: 14px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text); font-family: inherit; min-width: 280px;
  }
  .auth input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .auth button {
    padding: 9px 16px; font-size: 14px; font-weight: 500; border-radius: 8px;
    background: var(--accent); color: #fff; border: none; cursor: pointer; font-family: inherit;
  }
  .auth button:hover { opacity: 0.9; }

  .empty {
    background: var(--surface); border: 1px dashed var(--border); border-radius: 12px;
    padding: 48px 24px; text-align: center; color: var(--muted); margin-top: 24px;
  }

  .card-list { display: grid; gap: 12px; margin-top: 16px; }
  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 16px 20px;
  }
  .card-row { display: flex; align-items: flex-start; gap: 16px; flex-wrap: wrap; }
  .card-main { flex: 1; min-width: 200px; }
  .card-id { font-size: 11px; color: var(--faint); font-family: ui-monospace, monospace; }
  .card-name { font-size: 16px; font-weight: 600; margin: 2px 0; }
  .card-contact { font-size: 13px; color: var(--muted); }
  .card-resources { display: flex; gap: 24px; flex-wrap: wrap; }
  .res-block { font-size: 13px; }
  .res-label { font-size: 11px; color: var(--faint); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; font-weight: 600; }
  .res-links { display: flex; gap: 10px; }
  .res-links a { color: var(--accent); text-decoration: none; font-weight: 500; }
  .res-links a:hover { text-decoration: underline; }
  .res-empty { color: var(--faint); font-style: italic; }

  .card-meta { display: flex; align-items: center; gap: 12px; }
  .badge {
    display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 600;
  }
  .badge.on { background: var(--on-bg); color: var(--on-text); border: 1px solid var(--on-border); }
  .badge.off { background: var(--off-bg); color: var(--off-text); }
  .card-date { font-size: 11px; color: var(--faint); }

  .card-actions { display: flex; gap: 8px; }
  .btn {
    padding: 6px 12px; font-size: 12px; font-weight: 500; border-radius: 6px;
    border: 1px solid var(--border); background: var(--surface); color: var(--text);
    cursor: pointer; font-family: inherit; transition: all 0.15s;
  }
  .btn:hover { background: var(--accent-soft); border-color: var(--accent); }
  .btn.danger { color: var(--danger); border-color: var(--danger); }
  .btn.danger:hover { background: var(--danger-soft); }

  @media (max-width: 600px) {
    .card-row { flex-direction: column; }
    .card-actions { width: 100%; }
    .btn { flex: 1; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div>
      <h1>クライアント一覧</h1>
      <div class="summary" id="summary">ADMIN_KEY を入力してください</div>
    </div>
    <div class="auth">
      <input type="password" id="key" placeholder="ADMIN_KEY">
      <button id="load">読み込み</button>
    </div>
  </div>

  <div id="content"></div>
</div>

<script>
const keyEl = document.getElementById('key');
const content = document.getElementById('content');
const summary = document.getElementById('summary');

function esc(s) { return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function resLinks(folder, sheet) {
  if (!folder && !sheet) return '<span class="res-empty">未登録</span>';
  const f = folder ? `<a href="https://drive.google.com/drive/folders/${folder}" target="_blank" rel="noopener">📁 Drive</a>` : '';
  const s = sheet ? `<a href="https://docs.google.com/spreadsheets/d/${sheet}" target="_blank" rel="noopener">📊 Sheet</a>` : '';
  return `<div class="res-links">${f}${s}</div>`;
}

async function load() {
  const key = keyEl.value;
  if (!key) return;
  sessionStorage.setItem('admin_key', key);
  summary.textContent = '読み込み中…';
  content.innerHTML = '';
  const res = await fetch('/api/admin/clients', { headers: { 'x-admin-key': key } });
  if (!res.ok) { summary.textContent = '認証エラー'; return; }
  const data = await res.json();
  const clients = data.clients;
  const onCount = clients.filter(c => c.active).length;
  summary.textContent = `${clients.length}件 (有効 ${onCount} / 停止 ${clients.length - onCount})`;
  if (clients.length === 0) {
    content.innerHTML = '<div class="empty">まだ登録されたクライアントはいません</div>';
    return;
  }
  const list = document.createElement('div');
  list.className = 'card-list';
  for (const c of clients) {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-row">
        <div class="card-main">
          <div class="card-id">#${c.id}</div>
          <div class="card-name">${esc(c.name)}</div>
          ${c.contact ? `<div class="card-contact">${esc(c.contact)}</div>` : ''}
        </div>
        <div class="card-resources">
          <div class="res-block">
            <div class="res-label">🧾 領収書</div>
            ${resLinks(c.receipts_folder_id, c.receipts_sheet_id)}
          </div>
          <div class="res-block">
            <div class="res-label">📄 請求書</div>
            ${resLinks(c.invoices_folder_id, c.invoices_sheet_id)}
          </div>
        </div>
        <div class="card-meta">
          <span class="badge ${c.active ? 'on' : 'off'}">${c.active ? '有効' : '停止'}</span>
          <span class="card-date">${c.created_at.slice(0, 10)}</span>
        </div>
        <div class="card-actions">
          <button class="btn" data-act="toggle" data-id="${c.id}" data-active="${c.active}">${c.active ? '停止' : '再開'}</button>
          <button class="btn danger" data-act="delete" data-id="${c.id}">削除</button>
        </div>
      </div>`;
    list.appendChild(card);
  }
  content.appendChild(list);
}

document.getElementById('load').addEventListener('click', load);
keyEl.addEventListener('keydown', e => { if (e.key === 'Enter') load(); });

content.addEventListener('click', async (e) => {
  const btn = e.target.closest('button[data-act]');
  if (!btn) return;
  const key = keyEl.value;
  const id = Number(btn.dataset.id);
  if (btn.dataset.act === 'toggle') {
    const active = btn.dataset.active === '1' ? 0 : 1;
    await fetch('/api/admin/clients', { method: 'PATCH', headers: { 'content-type': 'application/json', 'x-admin-key': key }, body: JSON.stringify({ id, active }) });
  } else if (btn.dataset.act === 'delete') {
    if (!confirm('このクライアントを削除しますか? 復元はできません。')) return;
    await fetch('/api/admin/clients', { method: 'DELETE', headers: { 'content-type': 'application/json', 'x-admin-key': key }, body: JSON.stringify({ id }) });
  }
  load();
});

const saved = sessionStorage.getItem('admin_key');
if (saved) { keyEl.value = saved; load(); }
</script>
</body>
</html>
